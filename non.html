<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💔 oh non...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d12;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    text-align: center;
    padding: 20px;
    position: relative;
  }

  /* Rain */
  .rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .drop {
    position: absolute;
    top: -20px;
    width: 1.5px;
    border-radius: 2px;
    animation: rainFall linear infinite;
    opacity: 0.35;
    background: linear-gradient(to bottom, transparent, #7090c0);
  }
  @keyframes rainFall {
    0% { transform: translateY(0) skewX(-5deg); }
    100% { transform: translateY(110vh) skewX(-5deg); }
  }

  /* Dark cloud */
  .cloud {
    font-size: 70px;
    margin-bottom: 12px;
    animation: cloudFloat 4s ease-in-out infinite;
    filter: grayscale(1) brightness(0.7);
  }
  @keyframes cloudFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .broken-heart {
    font-size: 90px;
    animation: shake 0.5s ease-in-out infinite alternate;
    display: block;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 18px #5a0020);
  }
  @keyframes shake {
    from { transform: rotate(-4deg) scale(0.97); }
    to   { transform: rotate(4deg) scale(1.03); }
  }

  .main-content {
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 2.8rem;
    color: #8a8a9a;
    margin-bottom: 14px;
    line-height: 1.3;
    text-shadow: 0 0 20px #30304050;
  }

  .subtitle {
    font-size: 1rem;
    color: #505060;
    line-height: 1.8;
    margin-bottom: 28px;
    max-width: 320px;
  }

  .sad-text {
    font-size: 0.9rem;
    color: #383845;
    margin-bottom: 30px;
    font-style: italic;
  }

  .back-btn {
    display: inline-block;
    padding: 12px 36px;
    border-radius: 50px;
    background: transparent;
    color: #505060;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    border: 1px solid #303040;
    transition: all 0.2s;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
  }
  .back-btn:hover {
    background: #1a1a25;
    color: #7070a0;
    border-color: #505070;
  }

  .emoji-row {
    font-size: 1.6rem;
    letter-spacing: 8px;
    margin-bottom: 26px;
    opacity: 0.5;
    filter: grayscale(1);
  }
</style>
</head>
<body>

<!-- Rain -->
<div class="rain" id="rain"></div>

<div class="main-content">
  <div class="cloud">🌧️</div>
  <span class="broken-heart">💔</span>
  <h1>oh... d'accord...</h1>
  <p class="subtitle">
    C'est pas grave...<br>
    je vais juste aller pleurer<br>
    dans mon coin 🥀
  </p>
  <div class="emoji-row">😢 🥀 😭 🥀 😢</div>
  <p class="sad-text">( tu aurais pu dire oui quand même... )</p>

</div>

<script>
const rain = document.getElementById('rain');
for (let i = 0; i < 80; i++) {
  const d = document.createElement('div');
  d.className = 'drop';
  d.style.left = Math.random() * 100 + 'vw';
  d.style.height = (14 + Math.random() * 22) + 'px';
  d.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
  d.style.animationDelay = (Math.random() * 2) + 's';
  rain.appendChild(d);
}
</script>
</body>
</html>
