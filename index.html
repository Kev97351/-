<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Une question pour toi...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff0f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart-float {
    position: absolute;
    bottom: -50px;
    animation: floatUp linear infinite;
    opacity: 0.4;
    font-size: 20px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(30deg); opacity: 0; }
  }

  /* ---- Heart of text ---- */
  .heart-container {
    position: relative;
    z-index: 1;
    margin-bottom: 30px;
  }

  .heart-text {
    width: 340px;
    height: 300px;
    position: relative;
  }

  .heart-text canvas {
    display: block;
  }

  /* ---- Question ---- */
  .question {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 30px;
    animation: fadeInUp 1s ease 0.5s both;
  }
  .question h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 2.6rem;
    color: #e05080;
    text-shadow: 0 2px 8px #f9c0d0;
    margin-bottom: 6px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- Cat ---- */
  .cat-section {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeInUp 1s ease 0.8s both;
    margin-bottom: 28px;
  }

  .cat-svg {
    width: 180px;
    filter: drop-shadow(0 4px 12px #f5a0c0);
    animation: catBounce 2.5s ease-in-out infinite;
  }
  @keyframes catBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* ---- Buttons ---- */
  .buttons {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 24px;
    margin-top: 4px;
    animation: fadeInUp 1s ease 1.1s both;
  }

  .btn {
    padding: 14px 44px;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
    display: inline-block;
    font-family: 'Poppins', sans-serif;
  }
  .btn-yes {
    background: linear-gradient(135deg, #ff6b9d, #ff3d77);
    color: #fff;
    box-shadow: 0 4px 18px #ffb3cb;
  }
  .btn-yes:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px #ff85b0;
  }
  .btn-no {
    background: #f0e8f0;
    color: #b07090;
    box-shadow: 0 2px 8px #e8d0e0;
  }
  .btn-no:hover {
    transform: scale(1.04);
    background: #e8dce8;
  }

  /* sparkle on yes */
  .btn-yes::after {
    content: ' 💖';
  }
</style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Heart of text -->
<div class="heart-container">
  <canvas id="heartCanvas" width="340" height="290"></canvas>
</div>

<!-- Question -->
<div class="question">
  <h1>Tu veux sortir avec moi ?</h1>
</div>

<!-- Cat with rose -->
<div class="cat-section">
  <svg class="cat-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="100" cy="165" rx="52" ry="58" fill="#f5c8d0"/>
    <!-- Belly -->
    <ellipse cx="100" cy="175" rx="32" ry="38" fill="#fff0f5"/>
    <!-- Head -->
    <ellipse cx="100" cy="90" rx="52" ry="48" fill="#f5c8d0"/>
    <!-- Ears -->
    <polygon points="55,55 45,22 78,48" fill="#f5c8d0"/>
    <polygon points="145,55 155,22 122,48" fill="#f5c8d0"/>
    <!-- Inner ears -->
    <polygon points="58,50 50,30 74,47" fill="#f0a0b8"/>
    <polygon points="142,50 150,30 126,47" fill="#f0a0b8"/>
    <!-- Eyes -->
    <ellipse cx="82" cy="88" rx="10" ry="11" fill="#2a1a2a"/>
    <ellipse cx="118" cy="88" rx="10" ry="11" fill="#2a1a2a"/>
    <circle cx="85" cy="85" r="3" fill="white"/>
    <circle cx="121" cy="85" r="3" fill="white"/>
    <!-- Nose -->
    <ellipse cx="100" cy="104" rx="5" ry="3.5" fill="#e06080"/>
    <!-- Mouth -->
    <path d="M95 108 Q100 114 105 108" stroke="#e06080" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Whiskers left -->
    <line x1="52" y1="102" x2="90" y2="107" stroke="#c090a8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="108" x2="90" y2="108" stroke="#c090a8" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Whiskers right -->
    <line x1="148" y1="102" x2="110" y2="107" stroke="#c090a8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="150" y1="108" x2="110" y2="108" stroke="#c090a8" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="73" cy="112" rx="10" ry="6" fill="#f0a0b8" opacity="0.5"/>
    <ellipse cx="127" cy="112" rx="10" ry="6" fill="#f0a0b8" opacity="0.5"/>
    <!-- Arms -->
    <path d="M52 155 Q30 140 35 120" stroke="#f5c8d0" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M148 155 Q170 140 165 120" stroke="#f5c8d0" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M148 200 Q185 190 180 165 Q175 145 160 150" stroke="#f5c8d0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Rose stem -->
    <line x1="162" y1="120" x2="162" y2="80" stroke="#5a9e40" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Leaf -->
    <ellipse cx="155" cy="100" rx="10" ry="5" fill="#5a9e40" transform="rotate(-30 155 100)"/>
    <!-- Rose head -->
    <circle cx="162" cy="74" r="14" fill="#e83060"/>
    <ellipse cx="155" cy="70" rx="9" ry="7" fill="#f04070" transform="rotate(-20 155 70)"/>
    <ellipse cx="170" cy="70" rx="9" ry="7" fill="#c02050" transform="rotate(20 170 70)"/>
    <ellipse cx="162" cy="65" rx="8" ry="6" fill="#f05080"/>
    <circle cx="162" cy="69" r="5" fill="#e83060"/>
  </svg>
</div>

<!-- Buttons -->
<div class="buttons">
  <a href="oui.html" class="btn btn-yes">Oui</a>
  <a href="non.html" class="btn btn-no">Non</a>
</div>

<script>
// ---- Floating hearts background ----
const bg = document.getElementById('heartsBg');
const emojis = ['💕','💗','💓','✨','🌸','💝'];
for (let i = 0; i < 18; i++) {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  h.style.left = Math.random() * 100 + '%';
  h.style.animationDuration = (5 + Math.random() * 8) + 's';
  h.style.animationDelay = (Math.random() * 8) + 's';
  h.style.fontSize = (14 + Math.random() * 18) + 'px';
  bg.appendChild(h);
}

// ---- Heart of "I LOVE YOU" text ----
const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Heart parametric: scale + offset
function heartPoint(t, scale, cx, cy) {
  const x = scale * 16 * Math.pow(Math.sin(t), 3);
  const y = -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return [cx + x, cy + y];
}

const text = "I LOVE YOU ";
const fontSize = 11;
ctx.font = `bold ${fontSize}px 'Poppins', sans-serif`;

const totalPoints = 220;
const scale = 9;
const cx = W / 2, cy = H / 2 + 10;

const pinkShades = ['#ff3d77','#ff6b9d','#e0205a','#ff9dbb','#c91a50'];

for (let i = 0; i < totalPoints; i++) {
  const t = (i / totalPoints) * 2 * Math.PI;
  const [px, py] = heartPoint(t, scale, cx, cy);
  const char = text[i % text.length];
  const color = pinkShades[i % pinkShades.length];
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(t + Math.PI / 2);
  ctx.fillStyle = color;
  ctx.font = `bold ${fontSize}px 'Poppins', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char, 0, 0);
  ctx.restore();
}
</script>
</body>
</html>
